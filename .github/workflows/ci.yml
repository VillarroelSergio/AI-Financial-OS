name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · Ruff y Pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Instalar uv y Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.11"
          working-directory: backend
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Instalar dependencias
        run: uv sync --frozen --group dev

      - name: Comprobar formato y calidad
        run: uv run --frozen ruff check .

      - name: Ejecutar pruebas
        run: uv run --frozen pytest

  frontend:
    name: Frontend · TypeScript y Vite
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Instalar Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Comprobar TypeScript y compilar
        run: npm run build

  rust:
    name: Tauri · Cargo check
    runs-on: windows-latest

    defaults:
      run:
        working-directory: apps/desktop/src-tauri

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configurar Rust estable
        run: |
          rustup update stable
          rustup default stable

      - name: Comprobar proyecto Rust
        run: cargo check --locked
