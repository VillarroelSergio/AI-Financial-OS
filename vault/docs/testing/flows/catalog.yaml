    execution: deterministic
    fixture: ai
    route: /assistant
    preconditions: [Proveedor fixture-ai disponible]
    steps: [{ action: Abrir Asistente, expected: Estado disponible visible }]
    assertions: [{ kind: api, expected: GET ai health = 200 }, { kind: ui, expected: Sin carga infinita y estado honesto }]
    cleanup: []
  - id: FLOW-29
    phase: L
    module: Asistente IA
    title: Chat contextual determinista
    execution: deterministic
    fixture: ai
    route: /finances?tab=gastos
    preconditions: [Gasto Restaurante 42.30 y provider fixture-ai]
    steps: [{ action: Abrir copiloto, expected: Panel visible }, { action: Preguntar gasto en Restaurante, expected: Respuesta contextual }]
    assertions: [{ kind: api, expected: POST ai chat = 200 con tool_calls }, { kind: domain, expected: Respuesta cita 42.30 }, { kind: network, expected: Payload solo usa claves de contexto permitidas }]
    cleanup: []
  - id: FLOW-30
    phase: M
    module: Ajustes
    title: Seguridad e integridad
    execution: deterministic
    fixture: security
    route: /settings
    preconditions: [Base efímera]
    steps: [{ action: Abrir Ajustes, expected: Estado de seguridad visible }, { action: Ejecutar comprobación de integridad, expected: Resultado ok }]
    assertions: [{ kind: api, expected: GET security status e integrity = 200 }, { kind: ui, expected: Política demo, estado y tablas visibles }]
