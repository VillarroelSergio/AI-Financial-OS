  - id: FLOW-32
    phase: N
    module: Resumen
    title: Consistencia final
    execution: deterministic
    fixture: core-finance
    route: /
    preconditions: [Fases previas completadas, T0 disponible]
    steps: [{ action: Volver a Resumen, expected: Estado final renderizado }]
    assertions: [{ kind: domain, expected: Patrimonio evoluciona según operaciones de fixture }, { kind: console, expected: Sin errores no controlados acumulados }]
    cleanup: []
  - id: FLOW-33
    phase: N
