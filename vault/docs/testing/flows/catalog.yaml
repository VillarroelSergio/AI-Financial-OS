    preconditions: [Recursos E2E creados]
    steps: [{ action: Eliminar recursos en orden inverso, expected: Base vuelve a estado vacío }, { action: Cerrar runner, expected: Puertos liberados }]
    assertions: [{ kind: api, expected: DELETE devuelve estado esperado }, { kind: domain, expected: Resumen equivalente a T0 }, { kind: network, expected: Puertos 1420 y 18010 libres }]
    cleanup: [Eliminar base efímera y artefactos temporales]
