<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Financial OS">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Marco: tarjeta redondeada con borde degradado (visible en tema claro y oscuro) -->
  <rect x="10" y="10" width="492" height="492" rx="104" fill="#FFFFFF" stroke="url(#ring)" stroke-width="12"/>

  <!-- Barras -->
  <rect x="150" y="232" width="64" height="140" rx="32" fill="#2F9E69"/>
  <rect x="224" y="150" width="64" height="222" rx="32" fill="#5A82AE"/>
  <rect x="300" y="288" width="64" height="84"  rx="32" fill="#C74E60"/>

  <!-- Base / estante -->
  <rect x="120" y="360" width="272" height="26" rx="13" fill="#ECECE6" stroke="#DEDED7" stroke-width="1.5"/>
</svg>
