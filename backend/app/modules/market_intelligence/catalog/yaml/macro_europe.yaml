# Campos historical:/retention: son metadatos RESERVADOS para ECO-5 (scheduler y
# job de retención). Hoy nadie los consume; no borrar hasta implementar ECO-5.

- id: inflation_eurozone
  name: "Inflación Eurozona"
  category: macro
  subcategory: inflation
  country: EA
  region: Eurozone
  frequency: monthly
  priority: critical
  dashboard: true
  ai: true
  historical: 10y
  retention: 5y
  unit: "%"
  description: "HICP inflación Eurozona"
  # ECO-2: ecb sirve tasas de política (DFR/MRR), no HICP; Eurostat es la fuente real.
  provider_primary: eurostat

- id: gdp_eurozone
  name: "PIB Eurozona"
  category: macro
  subcategory: gdp
  country: EA
  region: Eurozone
  frequency: quarterly
  priority: critical
  dashboard: true
  ai: true
  historical: 10y
  retention: 5y
  unit: "EUR bn"
  description: "Producto Interior Bruto Eurozona"
  provider_primary: eurostat
  provider_secondary: oecd

- id: unemployment_eurozone
  name: "Desempleo Eurozona"
  category: macro
  subcategory: employment
  country: EA
  region: Eurozone
  frequency: monthly
  priority: high
  dashboard: true
  ai: true
  historical: 10y
  retention: 5y
  unit: "%"
  description: "Tasa de desempleo Eurozona"
  provider_primary: eurostat

- id: industrial_production_eurozone
  name: "Producción Industrial Eurozona"
  category: macro
  subcategory: industrial
  country: EA
  region: Eurozone
  frequency: monthly
  priority: high
  dashboard: true
  ai: true
  historical: 5y
  retention: 3y
  unit: "index"
  description: "Índice producción industrial Eurozona"
  provider_primary: eurostat

# ECO-2: pmi_eurozone eliminado — PMI es de S&P Global (licencia de pago); Eurostat
# no lo publica. Fuera de alcance, no habrá proveedor gratuito.

- id: deposit_facility_eurozone
  name: "Tipo Facilidad de Depósito BCE"
  category: macro
  subcategory: policy_rate
  country: EA
  region: Eurozone
  frequency: daily
  priority: high
  dashboard: false
  ai: true
  historical: 30y
  retention: 30y
  unit: "%"
  description: "Tipo de la facilidad de depósito del BCE — referencia para cuentas remuneradas"
  provider_primary: ecb
  provider_secondary: fred

- id: consumer_confidence_eurozone
  name: "Confianza Consumidor Eurozona"
  category: macro
