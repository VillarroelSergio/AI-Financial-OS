# Campos historical:/retention: son metadatos RESERVADOS para ECO-5 (scheduler y
# job de retención). Hoy nadie los consume; no borrar hasta implementar ECO-5.

- id: cpi_usa
  name: "CPI USA"
  category: macro
  subcategory: inflation
  country: US
  region: USA
  frequency: monthly
  priority: critical
  dashboard: true
  ai: true
  historical: 10y
  retention: 5y
  unit: "%"
  description: "Consumer Price Index USA"
  # ECO-2: bls es la fuente canónica pero aún no implementa esta serie; fred la sirve.
  provider_primary: bls
  provider_secondary: fred

