##############################################################################
# AI Financial OS — Market Data Provider Configuration
# Todos los proveedores configurados son GRATUITOS.
# No se permite ningún proveedor de pago ni plan premium.
##############################################################################

paid_providers_allowed: false

providers:
  stooq:
    enabled: true
    priority: 1
    requires_api_key: false
    description: "Fuente principal. Sin API key. EOD + histórico diario para índices, forex, commodities."

  yahoo:
    enabled: true
    priority: 99
    requires_api_key: false
    role: last_resort
    diagnostic_mode: false
    description: "Último recurso. Solo si todos los demás proveedores fallan."

  finnhub:
    enabled: true
    priority: 2
    requires_api_key: true
    api_key_env: FINNHUB_API_KEY
    free_tier_only: true
    rate_limit_per_minute: 60
    description: "Acciones USA, forex, crypto, fundamentales. Free tier 60 req/min."

  alphavantage:
    enabled: true
    priority: 3
    requires_api_key: true
    api_key_env: ALPHA_VANTAGE_API_KEY
    free_tier_only: true
    rate_limit_per_day: 500
    description: "Acciones, forex, crypto. Free tier 25–500 req/día según cuenta."

  fmp:
    enabled: true
    priority: 4
    requires_api_key: true
    api_key_env: FMP_API_KEY
    free_tier_only: true
    rate_limit_per_day: 250
    description: "Acciones, ETFs, fundamentales, perfiles. Free tier 250 req/día."

  twelvedata:
    enabled: true
    priority: 2
    requires_api_key: true
    api_key_env: TWELVEDATA_API_KEY
    free_tier_only: true
    rate_limit_per_minute: 8
    rate_limit_per_day: 800
    description: "Índices, forex, acciones, crypto, commodities. Free tier 800 req/día."

##############################################################################
# Outlier detection thresholds per asset_type (fraction, not percent)
# A provider price is discarded if it deviates > threshold from median.
##############################################################################
outlier_thresholds:
  index:      0.01    # 1%
  stock:      0.02    # 2%
  forex:      0.005   # 0.5%
  crypto:     0.05    # 5%
  commodity:  0.03    # 3%
  bond:       0.01    # 1%
  volatility: 0.05    # 5%

##############################################################################
# Provider base weights per asset_type (used by ConsensusEngine)
# Higher = more trusted for that asset type.
##############################################################################
provider_weights:
  stooq:
    index: 0.9
    stock: 0.5
    bond: 0.8
    volatility: 0.8
    forex: 0.4
    crypto: 0.0
    commodity: 0.5
  finnhub:
    index: 0.7
    stock: 0.9
    forex: 0.6
    crypto: 0.85
    commodity: 0.3
    bond: 0.3
    volatility: 0.3
  twelvedata:
    index: 0.8
    stock: 0.75
    forex: 0.9
    crypto: 0.7
    commodity: 0.8
    bond: 0.5
    volatility: 0.5
  alphavantage:
    index: 0.6
    stock: 0.65
    forex: 0.7
    crypto: 0.6
    commodity: 0.4
    bond: 0.3
    volatility: 0.3
  fmp:
    index: 0.5
    stock: 0.7
    forex: 0.3
    crypto: 0.3
    commodity: 0.3
    bond: 0.3
    volatility: 0.2
  yahoo:
    index: 0.3
    stock: 0.3
    forex: 0.3
    crypto: 0.3
    commodity: 0.3
    bond: 0.3
    volatility: 0.3

##############################################################################
# Request budget limits (conservative daily caps for free-tier APIs)
##############################################################################
request_budget:
  alphavantage:
    daily_limit: 20      # standard free tier ~25 req/day; conservative cap
  twelvedata:
    daily_limit: 700     # free tier is 800; keep 100 margin
  fmp:
    daily_limit: 200     # free tier is 250; keep 50 margin

##############################################################################
# Routing — orden de proveedores por tipo de activo
##############################################################################
routing:
  # Yahoo is primary for indices/bonds/volatility because stooq is currently
  # blocked on this IP. stooq and finnhub kept as validators for cross-check
  # when stooq becomes available again. last_resort: none lets Yahoo enter the
  # regular fetch pool (instead of the last-resort guard) so is_fallback stays false.
  indices:
    primary: yahoo
    validators: [stooq, finnhub, fmp]
    budget_aware: []
    last_resort: none

  stocks_us:
    primary: finnhub
    validators: [twelvedata, fmp]
    budget_aware: [alphavantage]
    last_resort: yahoo

  stocks_europe:
    primary: yahoo
    validators: [stooq]
    budget_aware: []
    last_resort: none

  forex:
    primary: twelvedata
    validators: [finnhub]
    budget_aware: [alphavantage]
    last_resort: yahoo

  crypto:
    primary: finnhub
    validators: [twelvedata]
    budget_aware: [alphavantage]
    last_resort: yahoo

  commodity:
    primary: yahoo
    validators: [twelvedata]
    budget_aware: []
    last_resort: none

  bond:
    primary: yahoo
    validators: [stooq, fmp]
    budget_aware: []
    last_resort: none

  volatility:
    primary: yahoo
    validators: [stooq]
    budget_aware: []
    last_resort: none

  historical_daily:
    primary: alphavantage
    validators: [fmp, yahoo]
    budget_aware: [alphavantage]
    last_resort: yahoo

  fundamentals:
    primary: fmp
    validators: [finnhub, alphavantage]
    budget_aware: [alphavantage]
    last_resort: yahoo

##############################################################################
# TTL de caché por tipo (segundos)
##############################################################################
cache_ttl:
  quote_crypto: 300        # 5 min
  quote_index: 900         # 15 min
  quote_stock: 900         # 15 min
  quote_forex: 900         # 15 min
  quote_commodity: 900     # 15 min
  quote_bond: 900          # 15 min
  quote_volatility: 300    # 5 min
  eod: 86400               # 24 horas
  historical_daily: 86400  # 24 horas
  fundamentals: 604800     # 7 días
  company_profile: 2592000 # 30 días

